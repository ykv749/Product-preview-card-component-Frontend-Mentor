<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <script
      src="https://kit.fontawesome.com/a7b822cf68.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Test</title>
  </head>
  <body>
    <main-component>
      <div class="container">
        <img
          srcset="
            images/image-product-desktop.jpg 600w,
            images/image-product-mobile.jpg  686w
          "
          sizes="(max-width: 767px) 686px, 300px"
          src="images/image-product-desktop.jpg"
          alt="Perfume Bottle"
        />
        <div class="rich-text">
          <div class="rich-text__category">PERFUME</div>
          <div class="richt-text__heading h1">
            Gabrielle Essence Eau De Parfum
          </div>
          <div class="rich-text__paragraph">
            A floral, solar and voluptuous interpretation composed by Olivier
            Polge, Perfumer-Creator for the House of CHANEL.
          </div>

          <div class="prices">
            <div class="actual-price">$149.99</div>
            <div class="list-price">$169.99</div>
          </div>
          <button><i class="fa-solid fa-cart-shopping"></i>Add to Cart</button>
        </div>
      </div>
    </main-component>
  </body>
</html>
